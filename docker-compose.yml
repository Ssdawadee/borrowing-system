version: '3.9'

services:
  database:
    image: alpine:3.20
    command: ["sh", "-c", "mkdir -p /data && tail -f /dev/null"]
    volumes:
      - sqlite_data:/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    depends_on:
      - database
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      JWT_SECRET: super-secret-university-key
      TOKEN_EXPIRES_IN: 7d
      DATABASE_PATH: /app/backend/data/university-club.db
      CORS_ORIGIN: "*"
      REMINDER_DAYS: 3
    volumes:
      - sqlite_data:/app/backend/data

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  sqlite_data: